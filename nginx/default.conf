# Chuyển hướng HTTP (80) sang HTTPS (443)
server {
    listen 80;
    server_name bizeng.vn www.bizeng.vn;
    
    return 301 https://$host$request_uri;
}

# Cấu hình HTTPS (443)
server {
    listen 443 ssl;
    server_name bizeng.vn www.bizeng.vn;

    # Đường dẫn tới chứng chỉ SSL từ Cloudflare
    ssl_certificate /etc/nginx/ssl/bizeng.vn.pem;
    ssl_certificate_key /etc/nginx/ssl/bizeng.vn.key;

    # Cấu hình SSL an toàn cơ bản
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Giới hạn kích thước file upload
    client_max_body_size 100M;

    location / {
        proxy_pass http://moodle:8080;
        
        # Chuyển tiếp các header quan trọng
        proxy_set_header Host $host;
        
        # Lấy IP thật của người dùng từ Cloudflare thay vì IP của Cloudflare
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        
        # Báo cho Moodle biết request đang dùng HTTPS
        proxy_set_header X-Forwarded-Proto https;
        
        # Tăng timeout
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
    }
}