version: "3.8"

services:
  mariadb:
    image: bitnami/mariadb:latest
    container_name: moodle_db
    environment:
      - MARIADB_USER=moodle
      - MARIADB_PASSWORD=moodle_secure_password
      - MARIADB_DATABASE=bitnami_moodle
      - MARIADB_ROOT_PASSWORD=root_secure_password
    volumes:
      - mariadb_data:/bitnami/mariadb
    restart: always

  moodle:
    image: bitnami/moodle:latest
    container_name: moodle_app
    environment:
      - MOODLE_DATABASE_HOST=mariadb
      - MOODLE_DATABASE_PORT_NUMBER=3306
      - MOODLE_DATABASE_USER=moodle
      - MOODLE_DATABASE_PASSWORD=moodle_secure_password
      - MOODLE_DATABASE_NAME=bitnami_moodle
      # Khai báo biến này để Moodle hiểu nó đang chạy sau một Reverse Proxy (Nginx)
      - MOODLE_REVERSEPROXY=yes
    volumes:
      - moodle_data:/bitnami/moodle
      - moodledata_data:/bitnami/moodledata
    depends_on:
      - mariadb
    restart: always
  nginx:
    image: nginx:latest
    container_name: moodle_nginx
    ports:
      - "80:80"
      - "443:443" # Đã mở port 443
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro # Mount chứng chỉ SSL vào Nginx
    depends_on:
      - moodle
    restart: always

volumes:
  mariadb_data:
  moodle_data:
  moodledata_data:
